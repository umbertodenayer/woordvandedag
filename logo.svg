<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" fill="none">

  <!-- WOORD (terracotta, wide tracking) -->
  <text x="4" y="82"
    font-family="'Fraunces', Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="700" letter-spacing="6"
    fill="#C4714A">WOORD</text>

  <!-- Left rule lines -->
  <line x1="4"   y1="96" x2="156" y2="96" stroke="#C4714A" stroke-width="1.4"/>

  <!-- Right rule lines -->
  <line x1="444" y1="96" x2="596" y2="96" stroke="#C4714A" stroke-width="1.4"/>

  <!-- VAN DE DAG (dark, wide tracking) -->
  <text x="444" y="82"
    font-family="'Fraunces', Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="700" letter-spacing="6"
    fill="#3a3028">VAN DE DAG</text>

  <!-- === Central emblem, centred at (300, 60) === -->
  <g transform="translate(300,60)">

    <!-- Sunburst rays (behind everything) -->
    <g stroke="#C4714A" stroke-width="2.5" stroke-linecap="round">
      <!-- top -->
      <line x1="0"   y1="-10" x2="0"   y2="-36"/>
      <!-- top-right -->
      <line x1="9"   y1="-7"  x2="24"  y2="-28"/>
      <line x1="16"  y1="0"   x2="38"  y2="-10"/>
      <line x1="18"  y1="10"  x2="42"  y2="4"/>
      <!-- top-left -->
      <line x1="-9"  y1="-7"  x2="-24" y2="-28"/>
      <line x1="-16" y1="0"   x2="-38" y2="-10"/>
      <line x1="-18" y1="10"  x2="-42" y2="4"/>
    </g>

    <!-- Sun semicircle -->
    <path d="M -32 20 A 32 32 0 0 1 32 20 Z" fill="#C4714A"/>

    <!-- Open book -->
    <!-- Left cover/page -->
    <path d="M 0 14 C -12 12 -32 14 -46 19 L -46 48 C -32 43 -12 41 0 43 Z"
          fill="#f5f2ee" stroke="#3a3028" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Right cover/page -->
    <path d="M 0 14 C 12 12 32 14 46 19 L 46 48 C 32 43 12 41 0 43 Z"
          fill="#f5f2ee" stroke="#3a3028" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Page lines left -->
    <line x1="-38" y1="23" x2="-5"  y2="21" stroke="#3a3028" stroke-width="1.3"/>
    <line x1="-38" y1="30" x2="-5"  y2="28" stroke="#3a3028" stroke-width="1.3"/>
    <line x1="-38" y1="37" x2="-5"  y2="35" stroke="#3a3028" stroke-width="1.3"/>
    <!-- Page lines right -->
    <line x1="38"  y1="23" x2="5"   y2="21" stroke="#3a3028" stroke-width="1.3"/>
    <line x1="38"  y1="30" x2="5"   y2="28" stroke="#3a3028" stroke-width="1.3"/>
    <line x1="38"  y1="37" x2="5"   y2="35" stroke="#3a3028" stroke-width="1.3"/>
    <!-- Book spine -->
    <line x1="0" y1="14" x2="0" y2="43" stroke="#3a3028" stroke-width="2.2"/>
    <!-- Bottom curve of book -->
    <path d="M -46 48 Q 0 54 46 48" stroke="#3a3028" stroke-width="2.2" fill="none"/>

    <!-- W letter above book -->
    <text x="0" y="8"
      font-family="'Fraunces', Georgia, serif"
      font-size="24" font-weight="700" fill="#3a3028"
      text-anchor="middle">W</text>

    <!-- Feather / quill (tilted slightly) -->
    <g transform="translate(8,-40) rotate(18)">
      <!-- Main feather blade -->
      <path d="M 0 2 C 5 -6 12 -20 7 -34 C 4 -22 -3 -10 0 2 Z" fill="#3a3028"/>
      <!-- Central quill spine -->
      <line x1="3.5" y1="-16" x2="0" y2="4" stroke="#3a3028" stroke-width="1.2"/>
    </g>

  </g>

</svg>
