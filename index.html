<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="topbar">
      <p class="label">Word of the Day</p>
      <div class="lang-toggle">
        <button id="lang-en" class="lang-btn active" data-lang="en">EN</button>
        <button id="lang-nl" class="lang-btn" data-lang="nl">NL</button>
      </div>
    </div>
    <h1 id="word"></h1>
    <p id="pos" class="pos"></p>
    <p id="definition" class="definition"></p>
    <p id="example" class="example"></p>
    <p id="date" class="date"></p>
  </main>
  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
